<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operator Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  html,body{height:100%;margin:0;font-size:13px;background:#f4f4f4;}
  #wrap{display:flex;flex-direction:column;height:100%;}
  #header{background:#1b3a5c;color:#fff;height:46px;display:flex;align-items:center;
    padding:0 16px;justify-content:space-between;flex-shrink:0;z-index:200;}
  #header .pg-title{font-size:14px;font-weight:700;}
  #header .hdr-right{display:flex;gap:14px;align-items:center;font-size:13px;}
  #header .hdr-right a{color:#cde;cursor:pointer;text-decoration:none;}
  #header .hdr-right a:hover{text-decoration:underline;}
  #main{display:flex;flex:1;overflow:hidden;}

  /* Sidebar */
  #sidebar{width:196px;background:#fff;border-right:1px solid #d0d0d0;flex-shrink:0;overflow-y:auto;}
  .sb-group{font-size:11px;font-weight:700;text-transform:uppercase;color:#666;
    background:#ebebeb;padding:6px 12px;border-bottom:1px solid #d8d8d8;border-top:1px solid #d8d8d8;letter-spacing:.4px;}
  .sb-item{padding:8px 16px;cursor:pointer;color:#2c2c2c;font-size:13px;border-bottom:1px solid #f0f0f0;}
  .sb-item:hover{background:#e6eef8;color:#1b3a5c;}
  .sb-item.active{background:#1b3a5c;color:#fff;}
  .sb-sep{border-top:2px solid #ddd;margin:2px 0;}

  /* Content */
  #content{flex:1;overflow-y:auto;padding:14px;}

  /* Card */
  .c-card{background:#fff;border:1px solid #ccc;padding:14px;margin-bottom:12px;}
  .c-card-title{font-size:14px;font-weight:700;border-bottom:1px solid #e5e5e5;padding-bottom:8px;margin-bottom:12px;}

  /* Filter bar */
  .f-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-bottom:12px;}
  .f-grp{display:flex;flex-direction:column;}
  .f-grp label{font-size:11px;font-weight:700;color:#555;margin-bottom:2px;}
  .f-grp input,.f-grp select{font-size:13px;padding:3px 7px;border:1px solid #bbb;border-radius:2px;height:28px;min-width:90px;}

  /* Buttons */
  .btn-s{background:#1b3a5c;color:#fff;border:none;padding:3px 14px;height:28px;cursor:pointer;font-size:13px;border-radius:2px;}
  .btn-s:hover{background:#152e4a;}
  .btn-c{background:#fff;color:#333;border:1px solid #999;padding:3px 12px;height:28px;cursor:pointer;font-size:13px;border-radius:2px;}
  .btn-c:hover{background:#f0f0f0;}
  .btn-e{background:#198754;color:#fff;border:none;padding:3px 12px;height:28px;cursor:pointer;font-size:13px;border-radius:2px;}
  .btn-e:hover{background:#157347;}
  .btn-acc{background:#fff;color:#1b3a5c;border:1px solid #1b3a5c;padding:1px 8px;cursor:pointer;font-size:12px;border-radius:2px;}
  .btn-acc:hover{background:#1b3a5c;color:#fff;}
  .btn-back{background:#6c757d;color:#fff;border:none;padding:3px 12px;height:28px;cursor:pointer;font-size:13px;border-radius:2px;}
  .btn-back:hover{background:#5a6268;}

  /* Table */
  .tbl-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:12px;}
  thead th{background:#f0f0f0;border:1px solid #ccc;padding:6px 8px;white-space:nowrap;font-weight:700;}
  tbody td{border:1px solid #ddd;padding:5px 8px;white-space:nowrap;}
  tbody tr:hover td{background:#f9f9f9;}
  /* totals summary row inside table */
  tbody tr.total-row td{background:#e8f0fb;font-weight:700;border-top:2px solid #1b3a5c;}
  .win{color:#198754;font-weight:700;}
  .loss{color:#dc3545;font-weight:700;}
  .st-active{color:#198754;}
  .st-inactive{color:#dc3545;}

  /* Pagination */
  .pg-row{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:12px;}
  .pg-info{color:#555;}
  .pg-btns{display:flex;gap:3px;}
  .pg-btn{border:1px solid #ccc;background:#fff;padding:1px 8px;cursor:pointer;font-size:12px;border-radius:2px;}
  .pg-btn:hover,.pg-btn.cur{background:#1b3a5c;color:#fff;border-color:#1b3a5c;}
  .pg-btn[disabled]{opacity:.4;cursor:default;pointer-events:none;}

  /* Empty */
  .empty{text-align:center;color:#888;padding:22px;font-size:13px;}

  /* Player info bar */
  .p-info-bar{background:#eef3fa;border:1px solid #c5d5e8;padding:7px 12px;
    font-size:12px;margin-bottom:10px;border-radius:2px;display:flex;flex-wrap:wrap;gap:16px;}
  .p-info-bar span strong{color:#1b3a5c;}

  /* Edit account */
  .ea-tabs{display:flex;border-bottom:2px solid #1b3a5c;margin-bottom:14px;}
  .ea-tab{padding:6px 18px;cursor:pointer;font-size:13px;border:1px solid transparent;
    border-bottom:none;border-radius:3px 3px 0 0;margin-right:3px;}
  .ea-tab.active{background:#1b3a5c;color:#fff;}
  .ea-tab:not(.active){background:#f0f0f0;color:#333;border-color:#ccc;}
  .f-section{max-width:380px;}
  .f-section .fg{margin-bottom:10px;}
  .f-section .fg label{display:block;font-size:12px;font-weight:700;margin-bottom:2px;color:#444;}
  .f-section .fg input{width:100%;padding:4px 8px;border:1px solid #bbb;border-radius:2px;font-size:13px;}
  .msg-ok{background:#d1e7dd;border:1px solid #badbcc;color:#0f5132;padding:7px 12px;font-size:13px;margin-bottom:10px;border-radius:2px;}
  .msg-err{background:#f8d7da;border:1px solid #f5c6cb;color:#842029;padding:7px 12px;font-size:13px;margin-bottom:10px;border-radius:2px;}
</style>
</head>
<body>
<div id="wrap">
  <div id="header">
    <div class="pg-title" id="hdr-title">Player Account Search</div>
    <div class="hdr-right">
      <span>Operator: <strong>OperatorCo</strong></span>
      <a onclick="nav('edit')">Profile</a>
      <a onclick="logout()">Logout</a>
    </div>
  </div>
  <div id="main">
    <div id="sidebar">
      <div class="sb-group">Player Account</div>
      <div class="sb-item active" id="sb-pas" onclick="nav('pas')">Player Account Search</div>
      <div class="sb-item" id="sb-pss" onclick="nav('pss')">Player Spin Search</div>
      <div class="sb-group">Reports</div>
      <div class="sb-item" id="sb-gsr" onclick="nav('gsr')">Game Summary Report</div>
      <div class="sb-item" id="sb-gdr" onclick="nav('gdr')">Game Daily Report</div>
      <div class="sb-sep"></div>
      <div class="sb-item" id="sb-edit" onclick="nav('edit')">Edit Account</div>
      <div class="sb-item" onclick="logout()">Logout</div>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>
/* ================================================================
   DATA
================================================================ */
const GAME_MAP = {
  Slot:   ['Vegas Empire','Lucky 777','Buffalo Gold','Neon Reels','Golden Dragon',
           'Wild Safari','Jewel Quest','Phoenix Rise','Mystic Fortune','Coin Storm'],
  Fish:   ['Ocean King','Dragon Fish','Mermaid Bay','Shark Hunt','Deep Treasure'],
  Card:   ['Blackjack Pro','Texas Poker','Baccarat Classic','Speed Baccarat','Dragon Tiger'],
  Arcade: ['Fruit Blast','Candy Spin','Sky Rider','Turbo Crash','Neon Ball'],
  Casino: ['Roulette Classic','Mega Wheel','Andar Bahar','Sic Bo','Lucky Dice']
};
const ALL_GAMES  = Object.values(GAME_MAP).flat();
const GAME_TYPES = Object.keys(GAME_MAP);
const SITES      = ['MainSite','VIPLounge','MobileSite','AgentHub','BetZone'];

const rnd   = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick  = arr=>arr[rnd(0,arr.length-1)];
const zero2 = n=>String(n).padStart(2,'0');
const money = n=>parseFloat(n).toFixed(2);

function randDate(daysBack){
  const d=new Date();
  d.setDate(d.getDate()-rnd(0,daysBack));
  d.setHours(rnd(0,23),rnd(0,59),rnd(0,59));
  return d;
}
function fmtDT(d){return `${d.getFullYear()}-${zero2(d.getMonth()+1)}-${zero2(d.getDate())} ${zero2(d.getHours())}:${zero2(d.getMinutes())}:${zero2(d.getSeconds())}`;}
function fmtD(d){return `${d.getFullYear()}-${zero2(d.getMonth()+1)}-${zero2(d.getDate())}`;}

const PLAYERS=Array.from({length:100},(_,i)=>{
  const id=i+1;
  return {acc:`player${String(id).padStart(4,'0')}@portal.com`,pid:`PL${100000+id}`,
    nick:`User${id}`,email:`user${id}@mail.com`,
    status:pick(['Active','Active','Active','Inactive']),
    site:pick(SITES),balance:money(rnd(500,500000)/100)};
});

const SPINS=Array.from({length:2000},(_,i)=>{
  const p=pick(PLAYERS),gt=pick(GAME_TYPES),game=pick(GAME_MAP[gt]);
  const bet=rnd(10,5000)/100,winA=Math.random()<0.47?0:rnd(5,Math.round(bet*400))/100;
  const net=winA-bet,tS=randDate(365),tWL=new Date(tS.getTime()+rnd(500,4000));
  return {status:net>=0?'Win':'Loss',game,gameType:gt,acc:p.acc,pid:p.pid,
    spinID:`SP${10000000+i}`,sessionID:`SES${5000000+rnd(1,99999)}`,
    spinTime:fmtDT(tS),spinDate:fmtD(tS),
    betAmt:money(bet),winAmt:money(winA),wlAmt:money(winA),
    netWin:money(net),balance:money(rnd(100,100000)/100),currency:'SC',wlTime:fmtDT(tWL)};
});

/* ── Aggregate helpers ── */

/* Per-game summary rows. Also tracks totalLoss (money lost) */
function buildSummaryRows(src){
  const map={};
  src.forEach(s=>{
    if(!map[s.game]) map[s.game]={game:s.game,tb:0,tw:0,tl:0,ts:0,losses:0};
    const bet=parseFloat(s.betAmt),win=parseFloat(s.wlAmt);
    map[s.game].tb+=bet;
    map[s.game].tw+=win;
    map[s.game].ts++;
    if(s.status==='Loss'){map[s.game].tl+=bet-win;map[s.game].losses++;}
  });
  return Object.values(map).map(r=>{
    const nw=r.tw-r.tb;
    return {game:r.game,totalBet:money(r.tb),totalWin:money(r.tw),
      totalLoss:money(r.tl),netWin:money(nw),
      rtp:money(r.tb>0?(r.tw/r.tb)*100:0)+'%',totalSpins:r.ts};
  });
}

/* Daily rows: ONE row per date+game combination (aggregated) */
function buildDailyRows(src){
  const map={};
  src.forEach(s=>{
    const k=s.spinDate+'|'+s.game+'|'+s.gameType;
    if(!map[k]) map[k]={date:s.spinDate,game:s.game,gameType:s.gameType,tb:0,tw:0,ts:0};
    map[k].tb+=parseFloat(s.betAmt);
    map[k].tw+=parseFloat(s.wlAmt);
    map[k].ts++;
  });
  return Object.values(map).sort((a,b)=>b.date.localeCompare(a.date)).map(r=>{
    const nw=r.tw-r.tb;
    return {date:r.date,game:r.game,gameType:r.gameType,
      totalBet:money(r.tb),totalWin:money(r.tw),netWin:money(nw),
      rtp:money(r.tb>0?(r.tw/r.tb)*100:0)+'%',totalSpins:r.ts};
  });
}

/* Grand totals for a spin array */
function calcTotals(src){
  let tb=0,tw=0,tl=0,wins=0,losses=0;
  src.forEach(s=>{
    const bet=parseFloat(s.betAmt),win=parseFloat(s.wlAmt);
    tb+=bet;tw+=win;
    if(s.status==='Win') wins++; else {losses++;tl+=bet-win;}
  });
  const nw=tw-tb;
  return {tb:money(tb),tw:money(tw),tl:money(tl),nw:money(nw),
    rtp:money(tb>0?(tw/tb)*100:0)+'%',ts:src.length,wins,losses};
}

/* ================================================================
   SPA
================================================================ */
let currentPage='pas',acctPlayer=null;
const PAGE_TITLES={pas:'Player Account Search',pah:'Player Accounting History',
  pss:'Player Spin Search',gsr:'Game Summary Report',gdr:'Game Daily Report',edit:'Edit Account'};

function setSidebarActive(p){
  document.querySelectorAll('.sb-item').forEach(e=>e.classList.remove('active'));
  const el=document.getElementById('sb-'+p);if(el)el.classList.add('active');
}
function nav(page,payload){
  if(page==='pah'&&payload) acctPlayer=payload;
  currentPage=page;
  document.getElementById('hdr-title').textContent=PAGE_TITLES[page]||page;
  setSidebarActive(page);
  renderPage();
}
function logout(){
  if(!confirm('Are you sure you want to logout?'))return;
  document.getElementById('content').innerHTML='<div style="padding:60px;text-align:center;color:#555">You have been logged out.</div>';
  document.getElementById('sidebar').innerHTML='';
  document.getElementById('hdr-title').textContent='Logged Out';
}

/* ================================================================
   PAGINATION
================================================================ */
const PER_PAGE=20;
function paginate(data,page){
  const total=data.length,pages=Math.max(1,Math.ceil(total/PER_PAGE));
  const p=Math.min(Math.max(1,page),pages),start=(p-1)*PER_PAGE;
  return {slice:data.slice(start,start+PER_PAGE),total,pages,page:p,start};
}
function calcRange(cur,total){
  if(total<=7)return Array.from({length:total},(_,i)=>i+1);
  const r=[1];if(cur>3)r.push('…');
  for(let i=Math.max(2,cur-1);i<=Math.min(total-1,cur+1);i++)r.push(i);
  if(cur<total-2)r.push('…');r.push(total);return r;
}
function buildPageBtns(cur,total,cb){
  if(total<=1)return '';
  let o=`<button class="pg-btn" ${cur<=1?'disabled':''} onclick="${cb}(${cur-1})">&#8592;</button>`;
  calcRange(cur,total).forEach(r=>{
    if(r==='…')o+=`<span style="padding:1px 4px">…</span>`;
    else o+=`<button class="pg-btn${r===cur?' cur':''}" onclick="${cb}(${r})">${r}</button>`;
  });
  o+=`<button class="pg-btn" ${cur>=total?'disabled':''} onclick="${cb}(${cur+1})">&#8594;</button>`;
  return o;
}
function renderPager(id,page,total,totalPages,start,sliceLen,cb){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML=`<span class="pg-info">Showing ${total===0?0:start+1}–${start+sliceLen} of ${total}</span>
    <div class="pg-btns">${buildPageBtns(page,totalPages,cb)}</div>`;
}

/* ================================================================
   CSV EXPORT
================================================================ */
function csvExport(headers,rows,fname){
  const lines=[headers.join(','),...rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','))];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'}));
  a.download=fname;a.click();
}

/* ================================================================
   MODULE: PLAYER ACCOUNT SEARCH (pas)
================================================================ */
let pas_page=1,pas_data=[];
function html_pas(){return `
<div class="c-card">
  <div class="c-card-title">Player Account Search</div>
  <div class="f-bar">
    <div class="f-grp"><label>Player Account</label>
      <input id="pas_acc" type="text" placeholder="Enter player account" style="width:220px" oninput="pas_search()"></div>
    <button class="btn-s" onclick="pas_search()">Search</button>
    <button class="btn-c" onclick="pas_clear()">Clear</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Player Account</th><th>Player ID</th><th>Nickname</th><th>Email</th>
        <th>Status</th><th>Site Name</th><th>Balance</th><th>Action</th>
      </tr></thead>
      <tbody id="pas_body"></tbody>
    </table>
  </div>
  <div class="empty" id="pas_empty" style="display:none"></div>
  <div class="pg-row" id="pas_pg"></div>
</div>`;}
function pas_search(pg){
  pas_page=(typeof pg==='number')?pg:1;
  const acc=(document.getElementById('pas_acc')||{value:''}).value.trim().toLowerCase();
  pas_data=PLAYERS.filter(p=>!acc||p.acc.toLowerCase().includes(acc)||p.nick.toLowerCase().includes(acc));
  pas_render();
}
function pas_clear(){document.getElementById('pas_acc').value='';pas_page=1;pas_data=PLAYERS.slice();pas_render();}
function pas_go(p){pas_page=p;pas_render();}
function pas_render(){
  const {slice,total,pages,page,start}=paginate(pas_data,pas_page);
  const body=document.getElementById('pas_body'),empty=document.getElementById('pas_empty');
  if(!total){body.innerHTML='';empty.style.display='block';empty.textContent='No records found.';document.getElementById('pas_pg').innerHTML='';return;}
  empty.style.display='none';
  body.innerHTML=slice.map(p=>`<tr>
    <td>${p.acc}</td><td>${p.pid}</td><td>${p.nick}</td><td>${p.email}</td>
    <td class="${p.status==='Active'?'st-active':'st-inactive'}">${p.status}</td>
    <td>${p.site}</td><td>${p.balance}</td>
    <td><button class="btn-acc" onclick="openAcct('${p.acc}')">Accounting</button></td>
  </tr>`).join('');
  renderPager('pas_pg',page,total,pages,start,slice.length,'pas_go');
}
function openAcct(acc){nav('pah',PLAYERS.find(x=>x.acc===acc));}

/* ================================================================
   MODULE: PLAYER ACCOUNTING HISTORY (pah)
   Totals shown as a SINGLE TABLE ROW at the top (no boxes).
   Columns: Total Spins | Total Bet | Total Win | Total Loss | Net Win | RTP
   Separated from the detail table by a heading gap.
================================================================ */
let pah_page=1,pah_data=[],pah_allSpins=[];

function html_pah(){
  if(!acctPlayer)return '<div class="empty">No player selected.</div>';
  const gtOpts='<option value="">All</option>'+GAME_TYPES.map(g=>`<option>${g}</option>`).join('');
  return `
<button class="btn-back" style="margin-bottom:8px" onclick="nav('pas')">&#8592; Back</button>
<div class="p-info-bar">
  <span><strong>Account:</strong> ${acctPlayer.acc}</span>
  <span><strong>Player ID:</strong> ${acctPlayer.pid}</span>
  <span><strong>Nickname:</strong> ${acctPlayer.nick}</span>
  <span><strong>Balance:</strong> ${acctPlayer.balance}</span>
  <span><strong>Status:</strong> ${acctPlayer.status}</span>
</div>

<!-- SUMMARY TABLE (no boxes) -->
<div class="c-card" style="margin-bottom:10px">
  <div class="c-card-title">Player Summary</div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Total Spins</th><th>Total Bet</th><th>Total Win</th>
        <th>Total Loss</th><th>Net Win</th><th>RTP (%)</th>
      </tr></thead>
      <tbody id="pah_summary_body"></tbody>
    </table>
  </div>
</div>

<!-- DETAIL FILTER + TABLE -->
<div class="c-card">
  <div class="c-card-title">Accounting History</div>
  <div class="f-bar">
    <div class="f-grp"><label>Game Type</label>
      <select id="pah_gt" onchange="pah_updateGames()" style="width:110px">${gtOpts}</select></div>
    <div class="f-grp"><label>Game</label>
      <select id="pah_game" onchange="pah_search()" style="width:160px"><option value="">All Games</option></select></div>
    <div class="f-grp"><label>Date From</label><input id="pah_from" type="date" onchange="pah_search()"></div>
    <div class="f-grp"><label>Date To</label><input id="pah_to" type="date" onchange="pah_search()"></div>
    <button class="btn-s" onclick="pah_search()">Search</button>
    <button class="btn-c" onclick="pah_clear()">Clear</button>
    <button class="btn-e" onclick="pah_export()">Download</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>Status</th><th>Game</th><th>Game Type</th><th>Player Account</th><th>Spin ID</th>
        <th>Spin Time</th><th>Bet Amount</th><th>Win/Loss Amount</th><th>Net Win</th>
        <th>Balance</th><th>Currency</th><th>Win/Loss Time</th>
      </tr></thead>
      <tbody id="pah_body"></tbody>
    </table>
  </div>
  <div class="empty" id="pah_empty" style="display:none"></div>
  <div class="pg-row" id="pah_pg"></div>
</div>`;}

function pah_updateGames(){
  const gt=document.getElementById('pah_gt').value;
  const sel=document.getElementById('pah_game');
  const games=gt&&GAME_MAP[gt]?GAME_MAP[gt]:ALL_GAMES;
  sel.innerHTML='<option value="">All Games</option>'+games.map(g=>`<option>${g}</option>`).join('');
  pah_search();
}
function pah_search(pg){
  if(!acctPlayer)return;
  pah_page=(typeof pg==='number')?pg:1;
  const gt  =(document.getElementById('pah_gt')||{value:''}).value;
  const game=(document.getElementById('pah_game')||{value:''}).value;
  const from=(document.getElementById('pah_from')||{value:''}).value;
  const to  =(document.getElementById('pah_to')||{value:''}).value;
  pah_data=pah_allSpins.filter(s=>{
    if(gt&&s.gameType!==gt)   return false;
    if(game&&s.game!==game)   return false;
    if(from&&s.spinDate<from) return false;
    if(to&&s.spinDate>to)     return false;
    return true;
  });
  pah_renderSummary(pah_data);
  pah_render();
}
function pah_renderSummary(src){
  const t=calcTotals(src);
  const el=document.getElementById('pah_summary_body');if(!el)return;
  el.innerHTML=`<tr>
    <td><strong>${t.ts.toLocaleString()}</strong></td>
    <td><strong>${t.tb}</strong></td>
    <td class="win"><strong>${t.tw}</strong></td>
    <td class="loss"><strong>${t.tl}</strong></td>
    <td class="${parseFloat(t.nw)>=0?'win':'loss'}"><strong>${t.nw}</strong></td>
    <td><strong>${t.rtp}</strong></td>
  </tr>`;
}
function pah_clear(){
  ['pah_gt','pah_from','pah_to'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const sel=document.getElementById('pah_game');
  if(sel)sel.innerHTML='<option value="">All Games</option>'+ALL_GAMES.map(g=>`<option>${g}</option>`).join('');
  pah_page=1;pah_data=pah_allSpins.slice();
  pah_renderSummary(pah_data);pah_render();
}
function pah_go(p){pah_page=p;pah_render();}
function pah_render(){
  const {slice,total,pages,page,start}=paginate(pah_data,pah_page);
  const body=document.getElementById('pah_body'),empty=document.getElementById('pah_empty');

function html_pss(){

  <div class="empty" id="pss_empty" style="display:none"></div>

</div>`;}
function pss_updateGames(){
  const gt=document.getElementById('pss_gt').value;
  const sel=document.getElementById('pss_game');
  const games=gt&&GAME_MAP[gt]?GAME_MAP[gt]:ALL_GAMES;
  sel.innerHTML='<option value="">All Games</option>'+games.map(g=>`<option>${g}</option>`).join('');
  pss_search();
}
function pss_search(pg){
  pss_page=(typeof pg==='number')?pg:1;
  const type=(document.getElementById('pss_type')||{value:'all'}).value;
  const val =(document.getElementById('pss_val')||{value:''}).value.trim().toLowerCase();
  const gt  =(document.getElementById('pss_gt')||{value:''}).value;
  const game=(document.getElementById('pss_game')||{value:''}).value;
  pss_data=SPINS.filter(s=>{
    if(gt&&s.gameType!==gt)   return false;
    if(game&&s.game!==game)   return false;
    if(val){
      if(type==='all')    return s.spinID.toLowerCase().includes(val)||s.acc.toLowerCase().includes(val)||s.pid.toLowerCase().includes(val);
      if(type==='spinID') return s.spinID.toLowerCase().includes(val);
      if(type==='acc')    return s.acc.toLowerCase().includes(val);
      if(type==='pid')    return s.pid.toLowerCase().includes(val);
    }
    return true;
  });
  pss_render();
}
function pss_clear(){
  ['pss_type','pss_gt'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=(id==='pss_type'?'all':'');});
  document.getElementById('pss_val').value='';
  const sel=document.getElementById('pss_game');
  if(sel)sel.innerHTML='<option value="">All Games</option>'+ALL_GAMES.map(g=>`<option>${g}</option>`).join('');
  pss_page=1;pss_data=SPINS.slice();pss_render();
}
function pss_go(p){pss_page=p;pss_render();}
function pss_render(){
  const {slice,total,pages,page,start}=paginate(pss_data,pss_page);
  const body=document.getElementById('pss_body'),empty=document.getElementById('pss_empty');
  if(!total){body.innerHTML='';empty.style.display='block';empty.textContent='No records found.';document.getElementById('pss_pg').innerHTML='';return;}
  empty.style.display='none';
  body.innerHTML=slice.map(s=>`<tr>
    <td class="${s.status==='Win'?'win':'loss'}">${s.status}</td>
    <td>${s.game}</td><td>${s.gameType}</td><td>${s.acc}</td><td>${s.spinID}</td>
    <td>${s.spinTime}</td><td>${s.betAmt}</td><td>${s.wlAmt}</td>
    <td class="${parseFloat(s.netWin)>=0?'win':'loss'}">${s.netWin}</td>

  renderPager('pss_pg',page,total,pages,start,slice.length,'pss_go');
}

let edit_tab='profile';
function html_edit(){return `
<div class="c-card">
  <div class="c-card-title">Edit Account</div>
  <div class="ea-tabs">
    <div class="ea-tab${edit_tab==='profile'?' active':''}" onclick="edit_setTab('profile')">Edit Profile</div>

  </div>
  <div id="edit_tab_content">${edit_tab==='profile'?html_editProfile():html_changePassword()}</div>
</div>`;}
function edit_setTab(tab){
  edit_tab=tab;
  document.querySelectorAll('.ea-tab').forEach(el=>{
    el.classList.toggle('active',el.textContent.toLowerCase().includes(tab==='profile'?'profile':'password'));
  });
  document.getElementById('edit_tab_content').innerHTML=tab==='profile'?html_editProfile():html_changePassword();
}
function html_editProfile(){return `
<div id="edit_msg"></div>
<div class="f-section">
  <div class="fg"><label>Username</label><input id="ep_user" type="text" value="operator_admin"></div>
  <div class="fg"><label>Name</label><input id="ep_name" type="text" value="Operator Admin"></div>
  <div class="fg"><label>Email</label><input id="ep_email" type="email" value="admin@operatorportal.com"></div>
  <div class="fg"><label>Phone</label><input id="ep_phone" type="text" value="+1-555-0100"></div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <button class="btn-s" onclick="ep_save()">Save</button>
    <button class="btn-c" onclick="edit_clearMsg()">Cancel</button>
  </div>
</div>`;}
function html_changePassword(){return `
<div id="edit_msg"></div>
<div class="f-section">
  <div class="fg"><label>Current Password</label><input id="cp_cur" type="password" placeholder="Enter current password"></div>
  <div class="fg"><label>New Password</label><input id="cp_new" type="password" placeholder="Enter new password"></div>
  <div class="fg"><label>Confirm Password</label><input id="cp_conf" type="password" placeholder="Confirm new password"></div>
  <div style="display:flex;gap:8px;margin-top:4px">
    <button class="btn-s" onclick="cp_save()">Save</button>
    <button class="btn-c" onclick="edit_clearMsg()">Cancel</button>
  </div>
</div>`;}
function edit_showMsg(type,txt){const el=document.getElementById('edit_msg');if(el)el.innerHTML=`<div class="msg-${type}">${txt}</div>`;}
function edit_clearMsg(){const el=document.getElementById('edit_msg');if(el)el.innerHTML='';}
function ep_save(){
  const user=(document.getElementById('ep_user')||{value:''}).value.trim();
  const name=(document.getElementById('ep_name')||{value:''}).value.trim();
  const email=(document.getElementById('ep_email')||{value:''}).value.trim();
  if(!user||!name||!email){edit_showMsg('err','Username, Name and Email are required.');return;}
  if(!/^[^@]+@[^@]+\.[^@]+$/.test(email)){edit_showMsg('err','Please enter a valid email address.');return;}
  edit_showMsg('ok','Profile updated successfully.');
}
function cp_save(){
  const cur=(document.getElementById('cp_cur')||{value:''}).value;
  const nw =(document.getElementById('cp_new')||{value:''}).value;
  const cf =(document.getElementById('cp_conf')||{value:''}).value;
  if(!cur||!nw||!cf){edit_showMsg('err','All password fields are required.');return;}
  if(nw.length<8){edit_showMsg('err','New password must be at least 8 characters.');return;}
  if(nw!==cf){edit_showMsg('err','Passwords do not match.');return;}
  edit_showMsg('ok','Password changed successfully.');
  ['cp_cur','cp_new','cp_conf'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
}

/* ================================================================
   ROUTER
================================================================ */
function renderPage(){
  const el=document.getElementById('content');
  switch(currentPage){
    case 'pas':
      el.innerHTML=html_pas();pas_data=PLAYERS.slice();pas_page=1;pas_render();break;
    case 'pah':
      el.innerHTML=html_pah();
      if(acctPlayer){
        pah_allSpins=SPINS.filter(s=>s.acc===acctPlayer.acc);
        pah_data=pah_allSpins.slice();pah_page=1;
        pah_renderSummary(pah_data);pah_render();
      }
      break;
    case 'pss':
      el.innerHTML=html_pss();pss_data=SPINS.slice();pss_page=1;pss_render();break;
    case 'gsr':
      el.innerHTML=html_gsr();gsr_data=buildSummaryRows(SPINS);gsr_page=1;gsr_render();break;
    case 'gdr':
      el.innerHTML=html_gdr();gdr_data=buildDailyRows(SPINS);gdr_page=1;gdr_render();break;
    case 'edit':
      el.innerHTML=html_edit();break;
    default:
      el.innerHTML='<div class="empty">Page not found.</div>';
  }
}

nav('pas');
